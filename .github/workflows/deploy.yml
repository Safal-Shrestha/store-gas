name: Deploy Store Gas App

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Stop containers
        working-directory: .
        run: docker compose -f docker/docker-compose.prod.yml down -v
      
      - name: Build and run containers
        working-directory: .
        run: docker compose -f docker/docker-compose.prod.yml up -d --build

