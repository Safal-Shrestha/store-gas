name: Deploy Store Gas App

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Checkout repo
        run: |
          if [ ! -d /home/safal/store/store-gas/.git ]; then
            git clone https://github.com/Safal-Shrestha/store-gas.git /home/safal/store/store-gas
          fi

      - name: Pull latest code
        run: |
          cd /home/safal/store/store-gas
          git reset --hard HEAD
          git pull origin main
      
      - name: Build and run containers safely
        run: |
          docker compose \
            --env-file /home/safal/store/store-gas/.env \
            -f /home/safal/store/store-gas/docker/docker-compose.prod.yml \
            up -d --build --remove-orphans
