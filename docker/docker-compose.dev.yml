services:
  postgres:
    image: postgres:18
    container_name: store-gas-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "4321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ../backend/db/init:/docker-entrypoint-initdb.d

volumes:
  postgres_data: