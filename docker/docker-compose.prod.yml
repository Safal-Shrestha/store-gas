services:
  postgres:
    image: postgres:18
    container_name: store-gas-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "4321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  backend:
    build: ../backend
    container_name: store-gas-api
    restart: always
    depends_on:
      - postgres
    env_file:
      - ../.env
    ports:
      - "3000:3000"

  frontend:
    build: ../frontend
    container_name: store-gas-client
    restart: always
    ports:
      - "5173:5173"

volumes:
  postgres_data: