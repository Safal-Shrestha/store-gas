services:
  postgres:
    image: postgres:18
    container_name: store-gas-db
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "4321:5432"
    volumes:
      - ../db-data:/var/lib/postgresql
      - ../backend/db/init:/docker-entrypoint-initdb.d


  backend:
    build: ../backend
    container_name: store-gas-api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ../.env
    ports:
      - "3000:3000"

  frontend:
    build: ../frontend
    container_name: store-gas-client
    restart: unless-stopped
    ports:
      - "5173:5173"